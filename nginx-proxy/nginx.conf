events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;
        
        # Chức năng Login/Register/Logout trỏ thẳng vào Identity Service
        location /auth/ {
            proxy_pass http://identity-service:6000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Các chức năng nghiệp vụ khác trỏ vào Gateway
        location / {
            # Gateway này sẽ gọi ngược lại Identity Service để check Opaque Token
            proxy_pass http://host.docker.internal:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}