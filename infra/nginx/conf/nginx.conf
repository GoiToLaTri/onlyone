# Cấu hình cơ bản
worker_processes  1;

# error_log  /var/log/nginx/error.log warn;
# stderr log từ info trở lên
# error_log stderr info;
error_log logs/error.log debug;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=30s;
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    # Định nghĩa log định dạng JSON
    # 127.0.0.1 - - [24/Mar/2026:14:20:00 +0700] "GET /health HTTP/1.1" 200 2 "-" "PostmanRuntime/7.51.1" "-"
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Chỉ định nơi tìm các thư viện Lua
    lua_package_path "/etc/nginx/lua/?.lua;;";

    # Khai báo một vùng nhớ chia sẻ để lưu Key
    lua_shared_dict secrets_key 1m;
    init_by_lua_file /etc/nginx/lua/init.lua;

    # Cấu hình Server
    server {
        listen       80;
        server_name  localhost;

        # 1. Route kiểm tra sức khỏe (Health Check)
        location /health {
            default_type text/plain;
            return 200 "OK";
        }

        # 2. Route chính sử dụng file Lua để kiểm tra quyền
        location /identityservice {
            # Gọi file Lua trong thư mục infra/nginx/lua/
            access_by_lua_file /etc/nginx/lua/access_check.lua;

            # Nếu Lua cho phép đi tiếp, proxy sẽ đẩy sang service khác
            proxy_pass http://host.docker.internal:8000;
            
            # Tạm thời trả về nội dung nếu chưa có backend
            # default_type text/html;
            # content_by_lua_block {
            #     ngx.say("<p>Hello từ OpenResty! Lua da kiem tra xong.</p>")
            # }
        }

        location /userservice {
            # Gọi file Lua trong thư mục infra/nginx/lua/
            access_by_lua_file /etc/nginx/lua/access_check.lua;

            # Nếu Lua cho phép đi tiếp, proxy sẽ đẩy sang service khác
            proxy_pass http://host.docker.internal:8001;
            
            # Tạm thời trả về nội dung nếu chưa có backend
            # default_type text/html;
            # content_by_lua_block {
            #     ngx.say("<p>Hello từ OpenResty! Lua da kiem tra xong.</p>")
            # }
        }

        # Trang báo lỗi
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/local/openresty/nginx/html;
        }
    }
}