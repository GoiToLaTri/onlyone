// 1. Khai báo phiên bản (Bắt buộc dùng proto3 cho các dự án mới)
syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
// 2. Khai báo Package (Để tránh xung đột tên giữa các service)
package user;

// 3. Cấu hình riêng cho Java (Cực kỳ quan trọng để Spring Boot sinh code đẹp)
option java_package = "com.zwind.grpc.contracts.user"; // Tên package trong code Java
option java_multiple_files = true;  // Chia nhỏ các class ra nhiều file cho dễ đọc
option java_outer_classname = "UserProto";

service UserService {
  rpc findByPublicId(UserRequest) returns (UserResponse);
  rpc profile(google.protobuf.Empty) returns (UserResponse);
}

message UserRequest{
  string public_id = 1;
}

message UserResponse {
  string public_id = 1;
  string name = 2;
  string email = 3;
  google.protobuf.Timestamp created_at = 4;
}